repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: ["."]
        pass_filenames: false
        always_run: true
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: ["src", "research"]
        additional_dependencies:
          - "pandas>=2.3"
          - "pandas-stubs>=2.3"
          - "polars>=1.35"
          - "pydantic>=2.12"
          - "pyarrow>=22.0"
          - "python-dotenv>=1.2"
          - "SQLAlchemy>=2.0"
        pass_filenames: false
        always_run: true
  - repo: local
    hooks:
      - id: pit-bypass-guard
        name: PIT bypass guard
        entry: python scripts/check_pit_bypass.py
        language: system
        pass_filenames: false
        always_run: true
